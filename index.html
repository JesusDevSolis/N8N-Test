<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter VIP (React + Chat Dark Mode)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* --- COLORES PRINCIPALES (Dark Mode) --- */
            --chat--color--primary: #e74266;
            --chat--color--primary-shade-50: #db4061;
            --chat--color--primary--shade-100: #cf3c5c;

            /* Color secundario (Burbujas del usuario) */
            --chat--color--secondary: #20b69e;
            --chat--color-secondary-shade-50: #1ca08a;

            /* --- FONDOS Y TEXTOS --- */
            --chat--color-light: #1e1e1e;
            --chat--color-light-shade-50: #2d2d2d;
            --chat--color-light-shade-100: #404040;

            /* Textos */
            --chat--color-white: #e0e0e0;
            --chat--color-dark: #101330;
            --chat--color-medium: #a0a0a0;
            --chat--color-disabled: #555555;
            --chat--color-typing: #e0e0e0;

            /* --- LAYOUT BASE --- */
            --chat--spacing: 1rem;
            --chat--border-radius: 0.5rem;
            --chat--transition-duration: 0.15s;
            --chat--font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

            /* --- VENTANA DEL CHAT --- */
            --chat--window--width: 400px;
            --chat--window--height: 600px;
            --chat--window--bottom: var(--chat--spacing);
            --chat--window--right: var(--chat--spacing);
            --chat--window--z-index: 9999;
            --chat--window--border: 1px solid var(--chat--color-light-shade-100);
            --chat--window--border-radius: var(--chat--border-radius);
            --chat--window--margin-bottom: var(--chat--spacing);

            /* --- HEADER --- */
            --chat--header-height: auto;
            --chat--header--padding: var(--chat--spacing);
            --chat--header--background: #252526;
            --chat--header--color: #ffffff;
            --chat--header--border-top: none;
            --chat--header--border-bottom: 1px solid var(--chat--color-light-shade-100);
            --chat--header--border-left: none;
            --chat--header--border-right: none;
            --chat--heading--font-size: 2em;

            /* --- MENSAJES --- */
            --chat--message--font-size: 1rem;
            --chat--message--padding: var(--chat--spacing);
            --chat--message--border-radius: var(--chat--border-radius);
            --chat--message-line-height: 1.5;
            --chat--message--margin-bottom: calc(var(--chat--spacing) * 1);

            /* Mensaje del BOT */
            --chat--message--bot--background: #2d2d2d;
            --chat--message--bot--color: #e0e0e0;
            --chat--message--bot--border: 1px solid #404040;

            /* Mensaje del USUARIO */
            --chat--message--user--background: var(--chat--color--secondary);
            --chat--message--user--color: #ffffff;
            --chat--message--user--border: none;

            /* Bloques de código */
            --chat--message--pre--background: #111111;
            --chat--messages-list--padding: var(--chat--spacing);

            /* --- BOTÓN FLOTANTE --- */
            --chat--toggle--size: 64px;
            --chat--toggle--width: var(--chat--toggle--size);
            --chat--toggle--height: var(--chat--toggle--size);
            --chat--toggle--border-radius: 50%;
            --chat--toggle--background: var(--chat--color--primary);
            --chat--toggle--hover--background: var(--chat--color--primary-shade-50);
            --chat--toggle--active--background: var(--chat--color--primary--shade-100);
            --chat--toggle--color: #ffffff;

            /* --- ÁREA DE INPUT --- */
            --chat--textarea--height: 50px;
            --chat--textarea--max-height: 30rem;
            --chat--input--font-size: inherit;
            --chat--input--border: 1px solid var(--chat--color-light-shade-100);
            --chat--input--border-radius: 0;
            --chat--input--padding: 0.8rem;
            --chat--input--background: #252526;
            --chat--input--text-color: #ffffff;
            --chat--input--placeholder--font-size: var(--chat--input--font-size);
            --chat--input--border-active: 1px solid var(--chat--color--primary);

            /* --- BOTONES --- */
            --chat--button--padding: calc(var(--chat--spacing) * 5 / 8) var(--chat--spacing);
            --chat--button--border-radius: var(--chat--border-radius);
            --chat--button--color--primary: #ffffff;
            --chat--button--background--primary: var(--chat--color--secondary);

            /* --- CUERPO Y PIE --- */
            --chat--body--background: var(--chat--color-light);
            --chat--footer--background: #252526;
            --chat--footer--color: var(--chat--color-medium);
        }

        /* Override adicional */
        .chat-message {
            max-width: 75%;
        }

        /* Configuración Tailwind básica */
        tailwind.config= {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif']
                    }
                }
            }
        }
    </style>
</head>

<body
    class="bg-slate-950 text-slate-200 min-h-screen flex flex-col items-center justify-center p-4 font-sans bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-purple-900/40 via-slate-950 to-slate-950">

    <div id="root" class="w-full max-w-2xl"></div>

    <script type="text/babel">
        // 🔴 URL DE PRODUCCIÓN (API SUSCRIPTORES)
        const WEBHOOK_URL = "https://jesussolis.app.n8n.cloud/webhook/api-suscriptores";

        const { useState, useEffect } = React;

        function App() {
            const [suscriptores, setSuscriptores] = useState([]);
            const [loading, setLoading] = useState(false);
            const [form, setForm] = useState({ id: null, nombre: '', email: '' });
            const [isEditing, setIsEditing] = useState(false);

            useEffect(() => { fetchData(); }, []);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(WEBHOOK_URL, { method: 'GET' });
                    const data = await res.json();
                    let lista = Array.isArray(data) ? data : (data.data || []);
                    if (data && !Array.isArray(data) && !data.data && data.id) lista = [data];
                    setSuscriptores(lista);
                } catch (error) { console.error(error); }
                setLoading(false);
            };

            const handleSubmit = async () => {
                if (!form.nombre || !form.email) return alert("Completa los campos");
                const method = isEditing ? 'PUT' : 'POST';
                const payload = { nombre: form.nombre, email: form.email };
                if (isEditing) payload.id = form.id;

                try {
                    await fetch(WEBHOOK_URL, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    resetForm();
                    fetchData();
                } catch (error) { alert("Error al guardar"); }
            };

            const handleDelete = async (id) => {
                if (!confirm(`¿Eliminar ID #${id}?`)) return;
                try {
                    await fetch(WEBHOOK_URL, {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id })
                    });
                    fetchData();
                } catch (e) { alert("Error al eliminar"); }
            };

            const handleEdit = (sub) => {
                setForm({ id: sub.id, nombre: sub.nombre || sub.first_name, email: sub.email });
                setIsEditing(true);
            };

            const resetForm = () => {
                setForm({ id: null, nombre: '', email: '' });
                setIsEditing(false);
            };

            return (
                <div className="bg-slate-900/60 backdrop-blur-xl border border-white/10 rounded-2xl p-8 shadow-2xl relative z-10">
                    <h1 className="text-3xl font-bold mb-8 uppercase tracking-widest text-center text-transparent bg-clip-text bg-gradient-to-r from-white to-purple-500">
                        Newsletter VIP (React)
                    </h1>

                    {/* Formulario */}
                    <div className="mb-8 border-b border-white/10 pb-6">
                        <h3 className={`text-xl font-semibold mb-4 ${isEditing ? 'text-amber-400' : 'text-white'}`}>
                            {isEditing ? `✏️ Editando ID #${form.id}` : '✨ Nuevo Suscriptor'}
                        </h3>
                        <div className="space-y-4">
                            <input value={form.nombre} onChange={e => setForm({ ...form, nombre: e.target.value })} placeholder="Nombre Completo" className="w-full bg-slate-950/50 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-purple-500 outline-none transition-all" />
                            <input value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} placeholder="Correo Electrónico" className="w-full bg-slate-950/50 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-purple-500 outline-none transition-all" />
                        </div>
                        <div className="mt-6 flex flex-col gap-2">
                            <button onClick={handleSubmit} className={`w-full py-3.5 rounded-lg font-bold text-white shadow-lg transition transform active:scale-[0.98] ${isEditing ? 'bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500' : 'bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500'}`}>
                                {isEditing ? 'Actualizar Suscriptor' : 'Guardar Suscriptor'}
                            </button>
                            {isEditing && <button onClick={resetForm} className="text-slate-500 hover:text-slate-300 text-sm py-2">Cancelar Edición</button>}
                        </div>
                    </div>

                    {/* Tabla de Resultados */}
                    <div className="flex justify-between items-end mb-4">
                        <h3 className="text-xl font-semibold text-white">Base de Datos</h3>
                        <button onClick={fetchData} className="text-xs flex items-center gap-1 text-cyan-400 border border-cyan-400/30 px-3 py-1 rounded-full hover:bg-cyan-400/10 transition-colors">↻ Actualizar</button>
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full text-left border-separate border-spacing-y-2">
                            <thead><tr className="text-slate-500 text-sm"><th className="pb-2 pl-2">ID</th><th className="pb-2">Nombre</th><th className="pb-2">Email</th><th className="pb-2 text-right pr-2">Acciones</th></tr></thead>
                            <tbody className="text-sm">
                                {loading ? <tr><td colSpan="4" className="text-center py-8 text-slate-500 animate-pulse">Sincronizando...</td></tr> :
                                    suscriptores.length === 0 ? <tr><td colSpan="4" className="text-center py-8 text-slate-600">No hay datos aún.</td></tr> :
                                        suscriptores.map(sub => (
                                            <tr key={sub.id} className="bg-slate-950/30 hover:bg-slate-900/50 transition-colors group">
                                                <td className="py-3 px-3 font-mono text-emerald-400 font-bold text-xs rounded-l-lg border-y border-transparent">#{sub.id}</td>
                                                <td className="py-3 px-3 font-medium text-slate-200 border-y border-transparent">{sub.nombre || sub.first_name || '-'}</td>
                                                <td className="py-3 px-3 text-slate-400 border-y border-transparent">{sub.email}</td>
                                                <td className="py-3 px-3 text-right rounded-r-lg border-y border-transparent">
                                                    <div className="flex justify-end gap-2">
                                                        <button onClick={() => handleEdit(sub)} className="p-1.5 text-amber-400 hover:bg-amber-400/10 rounded-md">✏️</button>
                                                        <button onClick={() => handleDelete(sub.id)} className="p-1.5 text-rose-400 hover:bg-rose-400/10 rounded-md">🗑️</button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

        createChat({
            webhookUrl: 'https://jesussolis.app.n8n.cloud/webhook/a065ad2a-405d-4392-b9d3-47315637c7bd/chat',

            i18n: {
                en: {
                    title: '¡Hola! 👋',
                    subtitle: 'Asistente de Base de Datos',
                    footer: '',
                    getStarted: 'Nuevo Chat',
                    inputPlaceholder: 'Escribe tu pregunta...',
                },
            },

            mode: 'window',
            showWelcomeScreen: true,
            initialMessages: [
                '¡Hola! Soy tu asistente virtual.',
                'Puedo registrar, listar, editar o borrar suscriptores por ti. ¿Qué deseas hacer?'
            ],
        });
    </script>
</body>

</html>
